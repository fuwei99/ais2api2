<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台 - AIS2API Multi-Instance</title>
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #161b2a;
            --border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --success: #10b981;
            --error: #ef4444;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .badge-live {
            display: inline-flex;
            align-items: center;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-live::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.1); opacity: 0.3; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 1rem;
        }
        .stat-label { color: var(--text-muted); font-size: 0.875rem; }
        .stat-value { font-size: 1.5rem; font-weight: 700; margin-top: 0.5rem; }

        /* Main Table */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        .card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th {
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem 1.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }
        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }
        
        .status-pill {
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-ready { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .status-dead { background: rgba(239, 68, 68, 0.15); color: #f87171; }
        
        /* Action Panel */
        .action-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .action-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        input, select, button {
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.4);
            color: white;
            font-size: 0.875rem;
        }
        button {
            cursor: pointer;
            font-weight: 600;
            background: var(--primary);
            border: none;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button.danger { background: var(--error); }

        /* Logs */
        .log-window {
            background: #000;
            color: #10b981;
            font-family: 'Fira Code', 'SF Mono', monospace;
            padding: 1.5rem;
            border-radius: 1rem;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.75rem;
            white-space: pre-wrap;
            border: 1px solid var(--border);
        }

        .log-entry { margin-bottom: 4px; }
        .log-timestamp { color: var(--text-muted); margin-right: 8px; }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1 style="margin:0; font-size:1.5rem;">AIS2API <span style="color:var(--text-muted); font-weight:400;">Dashboard</span></h1>
            </div>
            <div class="badge-live" id="live-indicator">数据已同步</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">并发实例</div>
                <div class="stat-value" id="stat-instances">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">流模式</div>
                <div class="stat-value" id="stat-mode">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">强制推理</div>
                <div class="stat-value" id="stat-think">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">可用账号池</div>
                <div class="stat-value" style="font-size:1rem; color:var(--success)" id="stat-pool">-</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">实例池实时监控</div>
            <div style="overflow-x: auto;">
                <table id="instance-table">
                    <thead>
                        <tr>
                            <th>端口</th>
                            <th>状态</th>
                            <th>WS 连接</th>
                            <th>当前账号</th>
                            <th>使用次数</th>
                            <th>重试失败</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Dynamic -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="action-panel">
            <div class="card">
                <div class="card-header">实例管理</div>
                <div style="padding: 1.5rem;" class="action-group">
                    <input type="number" id="targetPort" placeholder="输入实例端口 (如 9998)">
                    <select id="accountSelect">
                        <option value="">-- 选择切换账号 --</option>
                    </select>
                    <button onclick="switchAccount()">执行账号切换</button>
                    <div style="font-size:0.75rem; color:var(--text-muted); margin-top:0.5rem;">
                        注：切换账号会导致相应实例立即重启。
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">全局控制</div>
                <div style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
                    <button style="background:rgba(255,255,255,0.05); border:1px solid var(--border)" onclick="toggleMode()">切换流模式 (Fake/Real)</button>
                    <button style="background:rgba(255,255,255,0.05); border:1px solid var(--border)" onclick="toggleThink()">开/关 强制推理</button>
                    <button class="danger" onclick="location.reload()">手动刷新页面</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">实时系统日志</div>
            <div class="log-window" id="log-container">正在加载日志流...</div>
        </div>
    </div>

    <script>
        let currentMode = 'real';
        let availableAccounts = [];

        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                // Stats
                document.getElementById('stat-instances').innerText = data.instances?.length || 0;
                document.getElementById('stat-mode').innerText = (data.streamingMode || 'unknown').toUpperCase();
                document.getElementById('stat-think').innerText = data.forceThinking || '关闭';
                document.getElementById('stat-pool').innerText = data.available || 'None';
                currentMode = data.streamingMode;

                // Table
                const tbody = document.querySelector('#instance-table tbody');
                tbody.innerHTML = '';
                
                data.instances.forEach(i => {
                    const row = document.createElement('tr');
                    const statusClass = i.status === 'READY' ? 'status-ready' : 'status-dead';
                    const wsClass = i.wsConnected ? 'color:var(--success)' : 'color:var(--error)';
                    
                    row.innerHTML = `
                        <td>${i.port}</td>
                        <td><span class="status-pill ${statusClass}">${i.status}</span></td>
                        <td style="${wsClass}">${i.wsConnected ? '● 已连接' : '○ 断开'}</td>
                        <td>${i.account}</td>
                        <td style="color:var(--text-muted)">${i.uses}</td>
                        <td style="color:var(--text-muted)">${i.fails}</td>
                        <td><button onclick="restart(${i.port})" style="padding:4px 10px; font-size:11px; background:transparent; border:1px solid var(--error); color:var(--error)">重启</button></td>
                    `;
                    tbody.appendChild(row);
                });

                // Dropdown
                if (data.availableIndices && JSON.stringify(data.availableIndices) !== JSON.stringify(availableAccounts)) {
                    availableAccounts = data.availableIndices;
                    const select = document.getElementById('accountSelect');
                    const val = select.value;
                    select.innerHTML = '<option value="">-- 选择切换账号 --</option>';
                    availableAccounts.forEach(idx => {
                        const opt = document.createElement('option');
                        opt.value = idx;
                        opt.innerText = `账号 #${idx}`;
                        select.appendChild(opt);
                    });
                    if (val) select.value = val;
                }

                // Logs
                const logBox = document.getElementById('log-container');
                const isBottom = logBox.scrollHeight - logBox.clientHeight <= logBox.scrollTop + 20;
                logBox.innerText = data.logs || '暂无日志';
                if (isBottom) logBox.scrollTop = logBox.scrollHeight;

                document.getElementById('live-indicator').innerText = '数据已同步 ' + new Date().toLocaleTimeString();

            } catch (err) {
                console.error('Update Failed:', err);
                document.getElementById('live-indicator').innerText = '同步异常 (正在重试...)';
                document.getElementById('live-indicator').style.color = 'var(--error)';
            }
        }

        async function restart(port) {
            if (!confirm(`确定要重启端口 ${port} 的实例吗？`)) return;
            const res = await fetch('/api/restart-instance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ port })
            });
            const msg = await res.text();
            alert(msg);
            updateStatus();
        }

        async function switchAccount() {
            const port = parseInt(document.getElementById('targetPort').value);
            const targetIndex = parseInt(document.getElementById('accountSelect').value);
            if (!port || isNaN(targetIndex)) return alert('请选择端口和目标账号');
            
            if (!confirm(`确定将实例 ${port} 切换到账号 #${targetIndex} 吗？`)) return;
            
            const res = await fetch('/api/switch-account', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ port, targetIndex })
            });
            const msg = await res.text();
            alert(msg);
            updateStatus();
        }

        async function toggleMode() {
            const newMode = currentMode === 'real' ? 'fake' : 'real';
            const res = await fetch('/api/set-mode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode: newMode })
            });
            alert(await res.text());
            updateStatus();
        }

        async function toggleThink() {
            const res = await fetch('/api/toggle-force-thinking', { method: 'POST' });
            alert(await res.text());
            updateStatus();
        }

        setInterval(updateStatus, 3000);
        updateStatus();
    </script>
</body>
</html>
